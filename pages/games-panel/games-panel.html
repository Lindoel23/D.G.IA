<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>(function(){var b=document.createElement("base");b.href=location.pathname.indexOf("/D.G.IA/")!==-1?"/D.G.IA/":"/";document.head.prepend(b)})()</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Jogos - D.G.IA</title>
    <link rel="stylesheet" href="shared/css/global.css">
    <link rel="stylesheet" href="shared/css/components.css">
    <link rel="stylesheet" href="pages/games-panel/games-panel.css">
        <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase/config.js"></script>
    <script src="firebase/auth.js"></script>
    <script src="firebase/accounts.js"></script>
    <script src="firebase/roles.js"></script>
    <script src="firebase/missions.js"></script>
<script src="shared/js/theme.js"></script>
    <script src="shared/js/icons.js"></script>
    <script src="shared/js/menu.js"></script>
    <script src="shared/js/loader.js"></script>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div class="title-group">
            <button id="menuTrigger" class="menu-btn" data-icon="menu"></button>
            <h1><span data-icon="gamepad"></span> Jogos</h1>
        </div>
    </div>

    <div id="configToast">Mensagem aqui</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('list', this)">Lista</button>
        <button class="tab-btn" onclick="switchTab('create', this)">Criar Novo</button>
    </div>

    <!-- VIEW: LISTA -->
    <div id="view-list">
        <div class="project-list" id="gamesList">Carregando...</div>
    </div>

    <!-- VIEW: CRIAR -->
    <div id="view-create" style="display:none;">
        <div class="card" style="border-color: var(--accent-color);">
            <h3 id="formTitle"><span data-icon="gamepad"></span> Novo Jogo</h3>
            <input type="hidden" id="editingId" value="">
            <label class="label-small">NOME DO JOGO</label>
            <input type="text" id="gameName" placeholder="Ex: Quiz da Guilda">
            <label class="label-small">CÓDIGO HTML (VISUAL)</label>
            <textarea id="gameHtml" placeholder="Cole o HTML do jogo aqui..." style="min-height:200px; font-family: monospace; font-size: 0.8rem;"></textarea>
            <label class="label-small">CÓDIGO LÓGICA (SERVER - OPCIONAL)</label>
            <textarea id="gameLogic" placeholder="Cole o logic.js do jogo aqui..." style="min-height:200px; font-family: monospace; font-size: 0.8rem;"></textarea>
            
            <button class="btn-perm" onclick="openPermissionsHub()">
                <span data-icon="shield"></span> GERENCIAR PERMISSÕES
            </button>

            <div class="btn-row">
                <button class="btn-cancel" onclick="resetForm()" id="cancelEditBtn" style="display:none;">CANCELAR</button>
                <button class="btn-save" onclick="saveGame()" id="saveGameBtn">SALVAR JOGO</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DE PERMISSÕES -->
<div id="permissionsHubModal" class="modal">
    <div class="modal-content">
        <h3><span data-icon="shield"></span> Permissões de Acesso</h3>
        <p style="color:#888; font-size:0.9rem;">Selecione quem pode ver este jogo.</p>
        
        <h4 style="color:#aaa; margin:15px 0 5px 0; font-size:0.8rem;">POR CARGO:</h4>
        <div id="permRolesList" class="role-select-grid" style="display:flex; flex-direction:column; gap:8px;"></div>
        
        <h4 style="color:#aaa; margin:15px 0 5px 0; font-size:0.8rem;">POR USUÁRIO:</h4>
        <div id="permUsersList" class="role-select-grid" style="display:flex; flex-direction:column; gap:8px;"></div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal('permissionsHubModal')">FECHAR</button>
        </div>
    </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO -->
<div id="customConfirmModal" class="modal" style="z-index: 15000;">
    <div class="modal-content" style="max-width: 350px; text-align: center; display: flex; flex-direction: column; align-items: center; padding: 30px 25px;">
        <h3 style="display:flex; flex-direction:column; justify-content:center; align-items:center; color:#ff4444; gap:15px;">
            <span data-icon="trash"></span> Atenção
        </h3>
        <p id="confirmMessage" style="color:#ccc; margin-bottom:25px;">Tem certeza?</p>
        <div class="btn-row" style="width:100%;">
            <button class="btn-cancel" onclick="closeConfirm()">CANCELAR</button>
            <button class="btn-danger" onclick="doConfirm()">CONFIRMAR</button>
        </div>
    </div>
</div>
<script src="shared/js/api-helpers.js"></script>
<script src="shared/js/toast.js"></script>
<script src="shared/js/modal.js"></script>
<script src="pages/games-panel/games-panel.js"></script>
</body>
</html>
